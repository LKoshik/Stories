<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stories</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Raleway:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0f;
    --surface: #131316;
    --border: #222228;
    --accent: #c9a96e;
    --accent-dim: #a07840;
    --text-primary: #e8e2d9;
    --text-secondary: #8a8278;
    --text-body: #c4bdb4;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text-primary);
    font-family: 'Raleway', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grain overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 999;
    opacity: 0.4;
  }

  /* LIBRARY VIEW */
  #library {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  .library-header {
    padding: 60px 60px 40px;
    border-bottom: 1px solid var(--border);
  }

  .library-header h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(2.5rem, 5vw, 4rem);
    font-weight: 300;
    letter-spacing: 0.08em;
    color: var(--text-primary);
  }

  .library-header p {
    margin-top: 8px;
    color: var(--text-secondary);
    font-size: 0.8rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }

  .stories-grid {
    padding: 60px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 2px;
  }

  .story-card {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 48px 40px;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: border-color 0.4s ease;
  }

  .story-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 3px;
    height: 0;
    background: var(--accent);
    transition: height 0.4s ease;
  }

  .story-card:hover {
    border-color: #333340;
  }

  .story-card:hover::before {
    height: 100%;
  }

  .story-number {
    font-size: 0.7rem;
    letter-spacing: 0.3em;
    color: var(--accent-dim);
    text-transform: uppercase;
    margin-bottom: 20px;
  }

  .story-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.9rem;
    font-weight: 300;
    line-height: 1.2;
    color: var(--text-primary);
    margin-bottom: 16px;
    transition: color 0.3s ease;
  }

  .story-card:hover .story-title {
    color: var(--accent);
  }

  .story-desc {
    font-size: 0.82rem;
    color: var(--text-secondary);
    line-height: 1.8;
    margin-bottom: 28px;
  }

  .story-meta {
    display: flex;
    align-items: center;
    gap: 16px;
    font-size: 0.72rem;
    color: var(--text-secondary);
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  .story-meta span {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .dot {
    width: 3px;
    height: 3px;
    border-radius: 50%;
    background: var(--border);
  }

  /* CHAPTERS VIEW */
  #chapters-view {
    display: none;
    min-height: 100vh;
  }

  .chapters-header {
    padding: 40px 60px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-start;
    gap: 40px;
  }

  .back-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-secondary);
    padding: 10px 20px;
    font-family: 'Raleway', sans-serif;
    font-size: 0.75rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.3s ease;
    white-space: nowrap;
    margin-top: 6px;
  }

  .back-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  .chapters-title-block h2 {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(1.8rem, 4vw, 3rem);
    font-weight: 300;
    color: var(--text-primary);
  }

  .chapters-title-block p {
    margin-top: 8px;
    color: var(--text-secondary);
    font-size: 0.78rem;
    letter-spacing: 0.15em;
  }

  .chapters-list {
    padding: 48px 60px;
    max-width: 800px;
  }

  .chapter-item {
    display: flex;
    align-items: center;
    gap: 28px;
    padding: 24px 0;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: all 0.3s ease;
    position: relative;
  }

  .chapter-item:first-child {
    border-top: 1px solid var(--border);
  }

  .chapter-item:hover .chapter-num {
    color: var(--accent);
  }

  .chapter-item:hover .chapter-name {
    color: var(--accent);
    transform: translateX(6px);
  }

  .chapter-num {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2rem;
    font-weight: 300;
    color: var(--border);
    min-width: 50px;
    transition: color 0.3s ease;
    line-height: 1;
  }

  .chapter-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.3rem;
    color: var(--text-primary);
    transition: all 0.3s ease;
  }

  .chapter-arrow {
    margin-left: auto;
    color: var(--border);
    font-size: 1.2rem;
    transition: all 0.3s ease;
  }

  .chapter-item:hover .chapter-arrow {
    color: var(--accent);
    transform: translateX(4px);
  }

  /* READER VIEW */
  #reader-view {
    display: none;
    min-height: 100vh;
  }

  .reader-header {
    padding: 28px 60px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .reader-nav {
    display: flex;
    gap: 12px;
  }

  .nav-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-secondary);
    padding: 8px 18px;
    font-family: 'Raleway', sans-serif;
    font-size: 0.72rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.3s ease;
  }

  .nav-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  .reader-chapter-label {
    font-size: 0.72rem;
    color: var(--text-secondary);
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }

  .reader-content {
    max-width: 680px;
    margin: 0 auto;
    padding: 80px 40px 120px;
  }

  .reader-chapter-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(1.6rem, 3vw, 2.4rem);
    font-weight: 300;
    color: var(--text-primary);
    margin-bottom: 60px;
    padding-bottom: 32px;
    border-bottom: 1px solid var(--border);
    line-height: 1.3;
  }

  .reader-body {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.15rem;
    line-height: 2;
    color: var(--text-body);
    font-weight: 300;
  }

  .reader-body p {
    margin-bottom: 1.6em;
  }

  .reader-body p.scene-break {
    text-align: center;
    color: var(--accent-dim);
    letter-spacing: 0.5em;
    margin: 2.5em 0;
    font-size: 0.9rem;
  }

  .reader-body em {
    font-style: italic;
    color: var(--text-primary);
  }

  /* Transitions */
  .fade-in {
    animation: fadeIn 0.5s ease forwards;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 600px) {
    .library-header, .stories-grid, .chapters-header,
    .chapters-list, .reader-header, .reader-content {
      padding-left: 24px;
      padding-right: 24px;
    }
    .stories-grid { padding-top: 32px; padding-bottom: 32px; }
    .chapters-header { flex-direction: column; gap: 20px; }
  }
</style>
</head>
<body>

<!-- LIBRARY -->
<div id="library">
  <div class="library-header">
    <h1>Stories</h1>
    <p>A collection of worlds</p>
  </div>
  <div class="stories-grid" id="stories-grid"></div>
</div>

<!-- CHAPTERS -->
<div id="chapters-view">
  <div class="chapters-header">
    <button class="back-btn" onclick="showLibrary()">← Library</button>
    <div class="chapters-title-block">
      <h2 id="chapters-story-title"></h2>
      <p id="chapters-story-meta"></p>
    </div>
  </div>
  <div class="chapters-list" id="chapters-list"></div>
</div>

<!-- READER -->
<div id="reader-view">
  <div class="reader-header">
    <div class="reader-nav">
      <button class="nav-btn" onclick="showChapters()">← Chapters</button>
    </div>
    <div class="reader-chapter-label" id="reader-label"></div>
  </div>
  <div class="reader-content">
    <div class="reader-chapter-title" id="reader-title"></div>
    <div class="reader-body" id="reader-body"></div>
  </div>
</div>

<script>
const stories = [
  {
    id: 1,
    title: "The Weight of Wings",
    description: "He can create anything. He chooses to earn everything. She survives for others. Together they begin to learn what it actually means to live.",
    chapters: [
      {
        number: 1,
        title: "Chapter 1",
        content: `<p>The alarm rang at 6:47.</p>

<p>Sia had set it for 6:45, which meant she had already been lying awake for two minutes, staring at the ceiling, rehearsing the day before it began. That was a habit she couldn't shake — this constant preparing, this mental ironing of every crease before stepping out into the world.</p>

<p>She sat up. The room was small. A single window faced east and in the mornings it let in just enough light to make the space feel almost cheerful, if you didn't look too hard. A study table buried under documents. A corkboard covered in sticky notes — deadlines, reminders, a quote her mother had texted her once that she'd written down because throwing it away felt wrong. <em>Don't embarrass us.</em></p>

<p>She hadn't thrown that one away either.</p>

<p>She got ready the way she always did — efficiently, quietly, with the particular discipline of someone who has never really had the luxury of a slow morning. There was always somewhere to be. Always someone's timeline to fit into. Growing up in a house where approval was the currency and disappointment was the penalty had a way of making you very, very punctual.</p>

<p>By 7:20 she was locking the door.</p>

<p>She checked the handle twice. Then a third time. Not because she doubted herself but because her mother's voice lived somewhere in the back of her head and it always asked — <em>are you sure?</em></p>

<p>She was never fully sure. That was the thing.</p>

<p class="scene-break">— — —</p>

<p>The station was a twelve minute walk if she moved fast, eight if she half-ran, which she did today because she'd spent three extra minutes on her hair and was now paying the price in breathlessness. The city was already awake around her — vendors setting up, school children dragging bags, an uncle arguing with an auto driver about four rupees.</p>

<p>She liked mornings like this. The city didn't care about her. It was just moving, the way cities do, indifferent and alive, and inside that indifference there was something almost freeing. Nobody on this street knew her grades. Nobody knew what her relatives said at the last family function. Nobody knew she'd failed her second interview last month and had told her parents she was still in the process.</p>

<p>On this street she was just a girl running for a train.</p>

<p>She made it. Barely.</p>

<p>She grabbed the overhead handle as the doors closed behind her and caught her breath, and it was in that particular breathless, in-between moment — swaying with the train, the city blurring past the window — that her mind went somewhere it occasionally went without her permission.</p>

<p>The alley.</p>

<p>Not the whole memory. Never the whole memory cleanly. Just fragments, the way certain things are stored — not as a film but as a series of photographs.</p>

<p>The sound of her own heartbeat.</p>

<p>The thief's voice, ugly and sharp.</p>

<p>And then — a back.</p>

<p>Broad. Still. Completely, almost <em>unreasonably</em> still, for someone standing between her and a knife. She remembered fixing her eyes on that back the way you grip something when you're falling. He hadn't turned around to check on her. Hadn't said anything reassuring. He had simply... stood there. Like a wall that had decided to become a person.</p>

<p>She didn't see his face clearly that night either. Only after, at the station, under the fluorescent lights, for just a moment — tired eyes, a plain jacket, an expression that wasn't pride or heroism, just something quiet. Like he'd done nothing unusual.</p>

<p><em>You'll be fine from here,</em> he'd said. Or something like that.</p>

<p>And then he was gone.</p>

<p>She had wanted to ask about the knife. She'd seen it — she knew she'd seen it — the blade had hit him, she heard the sound of it, and yet he hadn't buckled, hadn't bled, hadn't even flinched the way a person should. Something had been wrong about that moment and she hadn't been able to name it then and she still couldn't now.</p>

<p>She'd thought about him strangely often after that. Not romantically — or at least that's what she'd told herself. Just... curiously. The way you think about something that doesn't fit into your existing understanding of how people work. People didn't just step in front of knives for strangers. People didn't just <em>leave</em> after. People wanted something — thanks, recognition, a moment of being seen.</p>

<p>He hadn't seemed to want any of it.</p>

<p><em>I wonder if I'll ever run into him again,</em> she thought, not for the first time.</p>

<p>The train announced her stop.</p>

<p>She fixed her bag strap, smoothed her jacket, and stepped onto the platform. First day at Arkline Solutions. She had an orientation at 9 AM and a senior she was being assigned to and approximately forty things her mother had told her to remember before she left and she was definitely going to forget half of them.</p>

<p>But she was here. She'd made it through the interviews, made it past the relatives' commentary, made it to a real job with a real desk.</p>

<p>That had to count for something.</p>

<p class="scene-break">— — —</p>

<p>The office was clean and modern in that generic corporate way — glass partitions, motivational posters that nobody read, a receptionist with a headset and a smile that had clearly been practiced. Sia signed in, received her temporary ID badge, and was handed over to an HR associate named Preethi who spoke very fast and walked even faster.</p>

<p>"Your team lead will get you settled. He's been here three years, very reliable, not very talkative but don't take it personally, that's just him—"</p>

<p>They turned a corner.</p>

<p>"—he sits in the third row, there, the one by the—"</p>

<p>Preethi kept talking.</p>

<p>Sia stopped hearing her.</p>

<p>Because the man by the window had just looked up from his screen. Tired eyes. Plain expression. The particular stillness of someone who has learned not to spend energy on things that don't require it.</p>

<p>She knew that stillness.</p>

<p>She knew that <em>face.</em></p>

<p>Her brain did something strange — a kind of short circuit, a flash of fluorescent light and a train station and <em>you'll be fine from here</em> — and then snapped back to the present where she was standing in an office holding a badge with her photo on it and her mouth was very slightly open.</p>

<p>He looked at her the way someone looks at a new file placed on their desk. Neutral. Politely attentive. Zero recognition.</p>

<p>Of course. He hadn't really seen her face that night either.</p>

<p>But she had seen his.</p>

<p>Preethi was saying something about her role and responsibilities. Sia heard approximately none of it.</p>

<p>She didn't know why her heart was beating slightly faster than usual.</p>

<p>She turned back to Preethi and nodded at whatever was being explained, wearing the expression of someone who was absolutely paying attention.</p>

<p>She was not paying attention.</p>`
      }
    ]
  }
];

let currentStory = null;

function showLibrary() {
  document.getElementById('library').style.display = 'flex';
  document.getElementById('chapters-view').style.display = 'none';
  document.getElementById('reader-view').style.display = 'none';
  document.getElementById('library').classList.add('fade-in');
}

function showChapters(storyId) {
  if (storyId !== undefined) {
    currentStory = stories.find(s => s.id === storyId);
  }
  document.getElementById('library').style.display = 'none';
  document.getElementById('reader-view').style.display = 'none';

  document.getElementById('chapters-story-title').textContent = currentStory.title;
  document.getElementById('chapters-story-meta').textContent =
    `${currentStory.chapters.length} ${currentStory.chapters.length === 1 ? 'Chapter' : 'Chapters'}`;

  const list = document.getElementById('chapters-list');
  list.innerHTML = '';
  currentStory.chapters.forEach(ch => {
    const item = document.createElement('div');
    item.className = 'chapter-item';
    item.innerHTML = `
      <div class="chapter-num">${String(ch.number).padStart(2, '0')}</div>
      <div class="chapter-name">${ch.title}</div>
      <div class="chapter-arrow">→</div>
    `;
    item.onclick = () => showReader(ch.number);
    list.appendChild(item);
  });

  document.getElementById('chapters-view').style.display = 'block';
  document.getElementById('chapters-view').classList.add('fade-in');
}

function showReader(chapterNumber) {
  const ch = currentStory.chapters.find(c => c.number === chapterNumber);
  document.getElementById('chapters-view').style.display = 'none';

  document.getElementById('reader-label').textContent =
    `${currentStory.title}  ·  ${ch.title}`;
  document.getElementById('reader-title').textContent = ch.title;
  document.getElementById('reader-body').innerHTML = ch.content;

  document.getElementById('reader-view').style.display = 'block';
  document.getElementById('reader-view').classList.add('fade-in');
  window.scrollTo(0, 0);
}

// Build library
function buildLibrary() {
  const grid = document.getElementById('stories-grid');
  stories.forEach(story => {
    const card = document.createElement('div');
    card.className = 'story-card';
    card.innerHTML = `
      <div class="story-number">Story ${String(story.id).padStart(2, '0')}</div>
      <div class="story-title">${story.title}</div>
      <div class="story-desc">${story.description}</div>
      <div class="story-meta">
        <span>${story.chapters.length} ${story.chapters.length === 1 ? 'Chapter' : 'Chapters'}</span>
      </div>
    `;
    card.onclick = () => showChapters(story.id);
    grid.appendChild(card);
  });
}

buildLibrary();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stories</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Raleway:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0f;
    --surface: #131316;
    --border: #222228;
    --accent: #c9a96e;
    --accent-dim: #a07840;
    --text-primary: #e8e2d9;
    --text-secondary: #8a8278;
    --text-body: #c4bdb4;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text-primary);
    font-family: 'Raleway', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grain overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 999;
    opacity: 0.4;
  }

  /* LIBRARY VIEW */
  #library {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  .library-header {
    padding: 60px 60px 40px;
    border-bottom: 1px solid var(--border);
  }

  .library-header h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(2.5rem, 5vw, 4rem);
    font-weight: 300;
    letter-spacing: 0.08em;
    color: var(--text-primary);
  }

  .library-header p {
    margin-top: 8px;
    color: var(--text-secondary);
    font-size: 0.8rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }

  .stories-grid {
    padding: 60px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 2px;
  }

  .story-card {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 48px 40px;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: border-color 0.4s ease;
  }

  .story-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 3px;
    height: 0;
    background: var(--accent);
    transition: height 0.4s ease;
  }

  .story-card:hover {
    border-color: #333340;
  }

  .story-card:hover::before {
    height: 100%;
  }

  .story-number {
    font-size: 0.7rem;
    letter-spacing: 0.3em;
    color: var(--accent-dim);
    text-transform: uppercase;
    margin-bottom: 20px;
  }

  .story-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.9rem;
    font-weight: 300;
    line-height: 1.2;
    color: var(--text-primary);
    margin-bottom: 16px;
    transition: color 0.3s ease;
  }

  .story-card:hover .story-title {
    color: var(--accent);
  }

  .story-desc {
    font-size: 0.82rem;
    color: var(--text-secondary);
    line-height: 1.8;
    margin-bottom: 28px;
  }

  .story-meta {
    display: flex;
    align-items: center;
    gap: 16px;
    font-size: 0.72rem;
    color: var(--text-secondary);
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  .story-meta span {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .dot {
    width: 3px;
    height: 3px;
    border-radius: 50%;
    background: var(--border);
  }

  /* CHAPTERS VIEW */
  #chapters-view {
    display: none;
    min-height: 100vh;
  }

  .chapters-header {
    padding: 40px 60px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-start;
    gap: 40px;
  }

  .back-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-secondary);
    padding: 10px 20px;
    font-family: 'Raleway', sans-serif;
    font-size: 0.75rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.3s ease;
    white-space: nowrap;
    margin-top: 6px;
  }

  .back-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  .chapters-title-block h2 {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(1.8rem, 4vw, 3rem);
    font-weight: 300;
    color: var(--text-primary);
  }

  .chapters-title-block p {
    margin-top: 8px;
    color: var(--text-secondary);
    font-size: 0.78rem;
    letter-spacing: 0.15em;
  }

  .chapters-list {
    padding: 48px 60px;
    max-width: 800px;
  }

  .chapter-item {
    display: flex;
    align-items: center;
    gap: 28px;
    padding: 24px 0;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: all 0.3s ease;
    position: relative;
  }

  .chapter-item:first-child {
    border-top: 1px solid var(--border);
  }

  .chapter-item:hover .chapter-num {
    color: var(--accent);
  }

  .chapter-item:hover .chapter-name {
    color: var(--accent);
    transform: translateX(6px);
  }

  .chapter-num {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2rem;
    font-weight: 300;
    color: var(--border);
    min-width: 50px;
    transition: color 0.3s ease;
    line-height: 1;
  }

  .chapter-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.3rem;
    color: var(--text-primary);
    transition: all 0.3s ease;
  }

  .chapter-arrow {
    margin-left: auto;
    color: var(--border);
    font-size: 1.2rem;
    transition: all 0.3s ease;
  }

  .chapter-item:hover .chapter-arrow {
    color: var(--accent);
    transform: translateX(4px);
  }

  /* READER VIEW */
  #reader-view {
    display: none;
    min-height: 100vh;
  }

  .reader-header {
    padding: 28px 60px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .reader-nav {
    display: flex;
    gap: 12px;
  }

  .nav-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-secondary);
    padding: 8px 18px;
    font-family: 'Raleway', sans-serif;
    font-size: 0.72rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.3s ease;
  }

  .nav-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  .reader-chapter-label {
    font-size: 0.72rem;
    color: var(--text-secondary);
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }

  .reader-content {
    max-width: 680px;
    margin: 0 auto;
    padding: 80px 40px 120px;
  }

  .reader-chapter-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(1.6rem, 3vw, 2.4rem);
    font-weight: 300;
    color: var(--text-primary);
    margin-bottom: 60px;
    padding-bottom: 32px;
    border-bottom: 1px solid var(--border);
    line-height: 1.3;
  }

  .reader-body {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.15rem;
    line-height: 2;
    color: var(--text-body);
    font-weight: 300;
  }

  .reader-body p {
    margin-bottom: 1.6em;
  }

  .reader-body p.scene-break {
    text-align: center;
    color: var(--accent-dim);
    letter-spacing: 0.5em;
    margin: 2.5em 0;
    font-size: 0.9rem;
  }

  .reader-body em {
    font-style: italic;
    color: var(--text-primary);
  }

  /* Transitions */
  .fade-in {
    animation: fadeIn 0.5s ease forwards;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 600px) {
    .library-header, .stories-grid, .chapters-header,
    .chapters-list, .reader-header, .reader-content {
      padding-left: 24px;
      padding-right: 24px;
    }
    .stories-grid { padding-top: 32px; padding-bottom: 32px; }
    .chapters-header { flex-direction: column; gap: 20px; }
  }
</style>
</head>
<body>

<!-- LIBRARY -->
<div id="library">
  <div class="library-header">
    <h1>Stories</h1>
    <p>A collection of worlds - By Koshik</p>
  </div>
  <div class="stories-grid" id="stories-grid"></div>
</div>

<!-- CHAPTERS -->
<div id="chapters-view">
  <div class="chapters-header">
    <button class="back-btn" onclick="showLibrary()">← Library</button>
    <div class="chapters-title-block">
      <h2 id="chapters-story-title"></h2>
      <p id="chapters-story-meta"></p>

  </div>

</div>

<!-- READER -->
<div id="reader-view">

      <button class="nav-btn" onclick="showChapters()">← Chapters</button>
    </div>
    <div class="reader-chapter-label" id="reader-label"></div>

  <div class="reader-content">
    <div class="reader-chapter-title" id="reader-title"></div>
    <div class="reader-body" id="reader-body"></div>
  </div>
</div>

<script>
const stories = [
  {
    id: 1,
    title: "The Weight of Wings",
    description: "He can create anything. He chooses to earn everything. She survives for others. Together they begin to learn what it actually means to live.",
    chapters: [
      {
  number: 1,
  title: "Chapter 1",
  content: `<p>The alarm rang at 6:47.</p>

<p>Sia had set it for 6:45, which meant she had already been lying awake for two minutes, staring at the ceiling, rehearsing the day before it began. That was a habit she couldn't shake — this constant preparing, this mental ironing of every crease before stepping out into the world.</p>

<p>She sat up. The room was small. A single window faced east and in the mornings it let in just enough light to make the space feel almost cheerful, if you didn't look too hard. A study table buried under documents. A corkboard covered in sticky notes — deadlines, reminders, a quote her mother had texted her once that she'd written down because throwing it away felt wrong. <em>Don't embarrass us.</em></p>

<p>She hadn't thrown that one away either.</p>

<p>She got ready the way she always did — efficiently, quietly, with the particular discipline of someone who has never really had the luxury of a slow morning. There was always somewhere to be. Always someone's timeline to fit into.</p>

<p>Growing up in a house where approval was the currency and disappointment was the penalty had a way of making you very, very punctual.</p>

<p>By 7:20 she was locking the door.</p>

<p>She checked the handle twice. Then a third time. Not because she doubted herself but because her mother's voice lived somewhere in the back of her head and it always asked — <em>are you sure?</em></p>

<p>She was never fully sure. That was the thing.</p>

<p class="scene-break">— — —</p>

<p>The station was a twelve minute walk if she moved fast, eight if she half-ran, which she did today because she'd spent three extra minutes on her hair and was now paying the price in breathlessness. The city was already awake around her — vendors setting up, school children dragging bags, an uncle arguing with an auto driver about four rupees.</p>

<p>She liked mornings like this. The city didn't care about her. It was just moving, the way cities do, indifferent and alive, and inside that indifference there was something almost freeing. Nobody on this street knew her grades. Nobody knew what her relatives said at the last family function. Nobody knew she'd failed her second interview last month and had told her parents she was still in the process.</p>

<p>On this street she was just a girl running for a train.</p>

<p>She made it. Barely.</p>

<p>She grabbed the overhead handle as the doors closed behind her and caught her breath, and it was in that particular breathless, in-between moment — swaying with the train, the city blurring past the window — that her mind went somewhere it occasionally went without her permission.</p>

<p>The alley.</p>

<p>Not the whole memory. Never the whole memory cleanly. Just fragments, the way certain things are stored — not as a film but as a series of photographs.</p>

<p>The sound of her own heartbeat.</p>

<p>The thief's voice, ugly and sharp.</p>

<p>And then — a back.</p>

<p>Broad. Still. Completely, almost unreasonably still.</p>

<p>She remembered fixing her eyes on that back the way you grip something when you're falling. He hadn't turned around to check on her. Hadn't said anything reassuring. He had simply... stood there. Like a wall that had decided to become a person.</p>

<p>She didn't see his face clearly that night either. Only after, at the station, under the fluorescent lights, for just a moment — tired eyes, a plain jacket, an expression that wasn't pride or heroism, just something quiet. Like he'd done nothing unusual.</p>

<p><em>You'll be fine from here,</em> he'd said. Or something like that.</p>

<p>And then he was gone.</p>

<p>She had wanted to ask about the knife. She'd seen it — she knew she'd seen it — the blade had hit him, she heard the sound of it, and yet he hadn't buckled, hadn't bled, hadn't even flinched the way a person should. Something had been wrong about that moment and she hadn't been able to name it then and she still couldn't now.</p>

<p>She'd thought about him strangely often after that. Not romantically — or at least that's what she'd told herself. Just... curiously. The way you think about something that doesn't fit.</p>

<p>People didn't just step in front of knives for strangers. People didn't just <em>leave</em> after. People wanted something — thanks, recognition, a moment of being seen.</p>

<p>He hadn't seemed to want any of it.</p>

<p><em>I wonder if I'll ever run into him again,</em> she thought, not for the first time.</p>

<p>The train announced her stop.</p>

<p>She fixed her bag strap, smoothed her jacket, and stepped onto the platform. First day at Arkline Solutions. She had an orientation at 9 AM and a senior she was being assigned to and approximately forty things her mother had told her to remember before she left and she was definitely going to forget half of them.</p>

<p>But she was here. She'd made it through the interviews, made it past the relatives' commentary, made it to a real job with a real desk.</p>

<p>That had to count for something.</p>

<p class="scene-break">— — —</p>

<p>The office was clean and modern in that generic corporate way — glass partitions, motivational posters that nobody read, a receptionist with a headset and a smile that had clearly been practiced. Sia signed in, received her temporary ID badge, and was handed over to an HR associate named Preethi who spoke very fast and walked even faster.</p>

<p>"Your team lead will get you settled. He's been here three years, very reliable, not very talkative but don't take it personally, that's just him—"</p>

<p>They turned a corner.</p>

<p>"—he sits in the third row, there, the one by the—"</p>

<p>Preethi kept talking.</p>

<p>Sia stopped hearing her.</p>

<p class="scene-break">— — —</p>

<p>Because the man by the window had just looked up from his screen. Tired eyes. Plain expression. The particular stillness of someone who has learned not to spend energy on things that don't require it.</p>

<p>She knew that stillness.</p>

<p>She knew that <em>face.</em></p>

<p>Her brain did something strange — a kind of short circuit, a flash of fluorescent light and a train station and <em>you'll be fine from here</em> — and then snapped back to the present where she was standing in an office holding a badge with her photo on it and her mouth was very slightly open.</p>

<p>He looked at her the way someone looks at a new file placed on their desk. Neutral. Politely attentive. Zero recognition.</p>`
  }, 
      {
  number: 2,
  title: "Chapter 2",
  content: `<p>His voice was the first thing she registered clearly.</p>

<p>"Sia. Good morning. Welcome to the team."</p>

<p>Not warm exactly. But not the opposite either. Just — level. The kind of tone that didn't perform anything, didn't reach for anything. He said it the way someone states a fact they consider worth acknowledging.</p>

<p>"Good morning," she said back, and was relieved to find her own voice came out normal. Completely normal. Like her ribcage wasn't doing something strange.</p>

<p>"Please, have a seat."</p>

<p>He gestured to the desk beside his — already set up, monitor on, chair pushed in neatly — and went back to his screen.</p>

<p>Sia sat.</p>

<p>She placed her bag down. Straightened it. Then straightened it again because her hands needed something to do.</p>

<p>She reached forward and pressed the power button and watched it blink to life, and in that particular quiet of a machine waking up slowly, she became very aware of her own heartbeat.</p>

<p>It was loud.</p>

<p>Unreasonably, embarrassingly, almost <em>comically</em> loud, the way it only got when her body decided to panic about something her brain hadn't fully processed yet. She pressed her fingers lightly against the desk and focused on the sensation of the surface — cool, solid, real — and told herself to breathe.</p>

<p><em>It is just a person,</em> she thought. <em>It is just a desk. It is just a regular first day at a regular job.</em></p>

<p>The desktop finished loading.</p>

<p>She reached for the mouse.</p>

<p>Then his chair moved.</p>

<p>He pulled it closer — not dramatically, just practically, the way someone does when they need to point at a screen — and suddenly he was right there, close enough that she could see the small details she hadn't been able to from a distance. The slight tiredness around his eyes. The plain watch on his left wrist, nothing expensive. The way he held himself — not stiff exactly, just still. Like someone who had made peace with taking up exactly as much space as he needed and no more.</p>

<p>"So this is the dashboard you'll be working from," he said, reaching past her to click something on the screen. "Your access is limited for now, which is standard for the first two weeks. I'll walk you through the workflow once you've had time to get oriented. Nothing complicated."</p>

<p>She nodded.</p>

<p>He glanced at her.</p>

<p>"You're not taking notes."</p>

<p>"I'm — " she blinked. "I'm memorizing."</p>

<p>He looked at her for a moment in a way that was impossible to read, then turned back to the screen. "The onboarding document is in the shared folder. Everything I just said is in there anyway."</p>

<p>He showed her two more things — where to log her hours, who to contact for IT issues — and then pushed his chair back to its original position with the same quiet efficiency with which he'd moved it.</p>

<p>"That's enough for now," he said, already turning back to his own work. "Take some time to settle in. First days are a lot. I'll be here if you need anything."</p>

<p>He said it without looking up.</p>

<p>Sia stared at her screen.</p>

<p><em>He thinks I'm nervous,</em> she realized. <em>He looked at me fidgeting and holding my breath and he thought — first day jitters. New job. Understandable.</em></p>

<p>He had absolutely no idea.</p>

<p>She almost laughed. She caught it just in time and converted it into a small exhale that she hoped sounded like relief.</p>

<p class="scene-break">— — —</p>

<p>For a few minutes she actually tried to focus — opened the onboarding document, scrolled through it, read the same sentence four times without absorbing a single word. Then, because she was only human and had approximately zero control over it, she glanced sideways.</p>

<p>He was working.</p>

<p>That was the only way to describe it — just <em>working</em>, with a completeness that she didn't often see in people. No phone face-down beside the keyboard that he'd check every few minutes. No leaning back and staring at the ceiling. No low-grade fidgeting, the kind everyone did without noticing, the body's way of saying <em>I'd rather be somewhere else.</em></p>

<p>He was just — there. In it. Whatever was on that screen had his full attention and the rest of the world had apparently been filed away for later.</p>

<p>Sia had spent her whole life surrounded by people who were always half somewhere else. Her mother cooking while mentally calculating what the neighbours must think. Her father present at dinner but absent in every way that mattered. Friends who listened with one eye on their notifications.</p>

<p>She wasn't sure she had ever seen someone look so completely unbothered by the passage of time.</p>

<p>She didn't know what to do with that observation so she filed it away and turned back to her screen.</p>

<p>The onboarding document stared at her.</p>

<p>She read the same sentence a fifth time.</p>

<p>Outside the office windows the city continued its indifferent morning, and three feet to her left Veer worked in silence, and Sia's heart rate slowly, reluctantly, began to return to something resembling normal.</p>`
      }, 
      {
  number: 3,
  title: "Chapter 3",
  content: `<p>By eleven o'clock, Sia had read the onboarding document twice.</p>

<p>The second time she actually retained most of it, which she considered a personal victory given the circumstances. Her role was clearer now — data entry and report formatting to start, with the expectation that she'd move into analysis support within a month if she picked things up quickly. Standard junior trajectory. Nothing she couldn't handle.</p>

<p>She organised her desktop, created a folder structure that her mother would never know about and her father would never care about, and told herself firmly that she was here to work. To prove something. To be the person who showed up and delivered and didn't embarrass anyone.</p>

<p>She did not look sideways.</p>

<p>Mostly.</p>

<p class="scene-break">— — —</p>

<p>At 12:30 Veer's chair moved.</p>

<p>Sia had, against her will, become slightly attuned to the sounds of his desk — the specific rhythm of his typing, the particular way he set his coffee mug down, the almost imperceptible exhale he made when he finished a task and moved to the next one.</p>

<p>She told herself this was just heightened awareness from being in a new environment. Completely normal. Nothing specific about <em>him.</em></p>

<p>He stood, opened his desk drawer, and retrieved a lunchbox. Then he looked at her.</p>

<p>"Did you bring lunch?"</p>

<p>"Yes." She held up her bag slightly.</p>

<p>He nodded once. "I know a spot. Quieter than the cafeteria. You're welcome to join if you'd like."</p>

<p>She said yes before he finished the sentence, then made herself slow down. "Sure, that sounds good."</p>

<p>He waited while she gathered her things, which she appreciated without saying so.</p>

<p class="scene-break">— — —</p>

<p>The spot was a small landing on the building's sixth floor — a wide windowsill alcove that someone had unofficially claimed years ago with two chairs and a low table, tucked into a corner where two glass walls met. The city spread out below them, indifferent and enormous. Nobody else was there.</p>

<p>"How did you find this place," Sia said, looking around.</p>

<p>"I explored the building on my first week." He set his lunchbox on the table and sat. "Most people don't go above the fourth floor unless they have a reason to."</p>

<p>She sat across from him and began opening her box, and for a moment they were just two people unwrapping lunch in comfortable — or at least functional — silence.</p>

<p>Then he glanced over.</p>

<p>"That looks good." A pause. "Did you cook that?"</p>

<p>"Yes." She felt unreasonably pleased that he'd noticed. "It's nothing special, just—"</p>

<p>"Would you mind?"</p>

<p>She blinked. He was gesturing at her box with a slightly raised eyebrow — a question, not an assumption.</p>

<p>"Oh — yes, please, go ahead."</p>

<p>He took a small portion with the kind of care that suggested he was genuinely trying not to take too much, ate it, and was quiet for a moment.</p>

<p>"That's really good," he said. "You cook well."</p>

<p>It was a simple sentence. Completely straightforward. Sia felt heat rise to her face anyway and looked down at her box.</p>

<p>"Ahh — no, it's not really — thank you." She pressed her lips together. <em>Smooth, Sia. Very smooth.</em></p>

<p>She heard something. It wasn't quite a laugh — more like the suggestion of one, a slight shift in his breathing. She looked up and he had already turned back to his own lunch but there was something at the corner of his mouth that hadn't been there before.</p>

<p>He was amused. Quietly, privately, in a way he wasn't advertising. But amused.</p>

<p>"Would you like some of mine?" he asked.</p>

<p>"Oh — sure, just a little."</p>

<p>She tried it. And then she forgot to be flustered for a moment because it was genuinely, surprisingly good. Balanced and careful, the kind of food that tasted like someone had actually thought about it.</p>

<p>"This is delicious," she said, and meant it completely.</p>

<p>"Thank you. I'm still learning."</p>

<p>She looked at him. "You cooked this yourself?"</p>

<p>"Yes." He glanced at her. "Is that surprising?"</p>

<p>"No — I just—" She caught the slight expression on his face, that same interior amusement he wasn't quite showing. "I just asked."</p>

let currentStory = null;

function showLibrary() {
  document.getElementById('library').style.display = 'flex';
  document.getElementById('chapters-view').style.display = 'none';
  document.getElementById('reader-view').style.display = 'none';
  document.getElementById('library').classList.add('fade-in');
}

function showChapters(storyId) {
  if (storyId !== undefined) {
    currentStory = stories.find(s => s.id === storyId);
  }
  document.getElementById('library').style.display = 'none';
  document.getElementById('reader-view').style.display = 'none';

  document.getElementById('chapters-story-title').textContent = currentStory.title;
  document.getElementById('chapters-story-meta').textContent =
    `${currentStory.chapters.length} ${currentStory.chapters.length === 1 ? 'Chapter' : 'Chapters'}`;

  const list = document.getElementById('chapters-list');
  list.innerHTML = '';
  currentStory.chapters.forEach(ch => {
    const item = document.createElement('div');
    item.className = 'chapter-item';
    item.innerHTML = `
      <div class="chapter-num">${String(ch.number).padStart(2, '0')}</div>
      <div class="chapter-name">${ch.title}</div>
      <div class="chapter-arrow">→</div>
    `;
    item.onclick = () => showReader(ch.number);
    list.appendChild(item);
  });

  document.getElementById('chapters-view').style.display = 'block';
  document.getElementById('chapters-view').classList.add('fade-in');
}

function showReader(chapterNumber) {
  const ch = currentStory.chapters.find(c => c.number === chapterNumber);
  document.getElementById('chapters-view').style.display = 'none';

  document.getElementById('reader-label').textContent =
    `${currentStory.title}  ·  ${ch.title}`;
  document.getElementById('reader-title').textContent = ch.title;
  document.getElementById('reader-body').innerHTML = ch.content;

  document.getElementById('reader-view').style.display = 'block';
  document.getElementById('reader-view').classList.add('fade-in');
  window.scrollTo(0, 0);
}

// Build library
function buildLibrary() {
  const grid = document.getElementById('stories-grid');
  stories.forEach(story => {
    const card = document.createElement('div');
    card.className = 'story-card';
    card.innerHTML = `
      <div class="story-number">Story ${String(story.id).padStart(2, '0')}</div>
      <div class="story-title">${story.title}</div>
      <div class="story-desc">${story.description}</div>
      <div class="story-meta">
        <span>${story.chapters.length} ${story.chapters.length === 1 ? 'Chapter' : 'Chapters'}</span>
      </div>
    `;
    card.onclick = () => showChapters(story.id);
    grid.appendChild(card);
  });
}

buildLibrary();
</script>
